version: '3.8'

services:
  associados_api-gateway:
    build:
      context: ./backend/DocAssociados.ApiGateway
      dockerfile: DocAssociados.ApiGateway/Dockerfile
    container_name: associados_api-gateway
    ports:
      - "8090:8080"
    env_file:
      - .env.prod
    networks:
      - app-network
    depends_on:
      - associados-auth_service
      - associados_service
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  associados-auth_service:
    build:
      context: ./backend/DocAssociados.Identity
      dockerfile: DocAssociados.Identity.WebApi/Dockerfile
    container_name: associados-auth_service
    ports:
      - "8091:8080"
    env_file:
      - .env.prod
    networks:
      - app-network
    depends_on:
      - associadosAuth-db
    restart: always

  associados_service:
    build:
      context: ./backend/DocAssociados
      dockerfile: DocAssociados.WebApi/Dockerfile
    container_name: associados_service
    ports:
      - "8092:8080"
    env_file:
      - .env.prod
    networks:
      - app-network
    depends_on:
      - associados-db
    restart: always

  associados-db:
    image: mysql:8
    container_name: associados-db
    environment:
      MYSQL_DATABASE: associados
      MYSQL_ROOT_PASSWORD: ${MYSQL_ASSOCIADOS_PASSWORD}
    ports:
      - "3311:3306"
    volumes:
      - associados_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  associadosAuth-db:
    image: mysql:8
    container_name: associadosAuth-db
    environment:
      MYSQL_DATABASE: associadosAuthdb
      MYSQL_ROOT_PASSWORD: ${MYSQL_ASSOCIADOS_AUTH_PASSWORD}
    ports:
      - "3312:3306"
    volumes:
      - identity_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  associados_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: associados_frontend
    ports:
      - "8080:80"
    networks:
      - app-network
    restart: always