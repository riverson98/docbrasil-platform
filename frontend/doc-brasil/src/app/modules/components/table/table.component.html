<table class="table">
    <thead class="table__head">
        <tr>
            <th>Nome</th>
            <th>Status</th>
            <th>Função</th>

            <th>
                <div class="table__head--add" (click)="onOpenModal()">
                    <i class="fa-solid fa-plus"></i>
                    <p>Adicionar {{ addtitle }}</p>
                </div>
            </th>
        </tr>
    </thead>

    <tbody class="table__body">
        <tr class="table__body--container" *ngFor="let item of data" (click)="showUserDetails(item.id)">
            <td>
                <div class="table__body--container__user-info">
                    <h3 class="table__body--container__user-info--name">
                        {{ item.nome }}
                    </h3>

                    <p>
                        {{ item.email }}
                    </p>
                </div>
            </td>

            <td>
                <span [ngClass]="getStatus(item.status)">
                    {{ item.status | status }}
                </span>
            </td>

            <td>
                <p>{{ item.funcao | functionPipe }}</p>
            </td>

            <td>
                <div class="table__body--container__trash" (click)="openConfirmationModal(item.id); $event.stopPropagation()">
                    <i class="fa-solid fa-trash"></i>
                </div>
            </td>
        </tr>
    </tbody>
</table>

<div class="table__pagination" *ngIf="data.length > 10">
    <button (click)="goToPrevious()" [disabled]="currentPage === 1"><i class="fa-solid fa-caret-left"></i></button>
    <span>{{ currentPage }} / {{ totalPages }}</span>
    <button (click)="goToNext()" [disabled]="currentPage === totalPages"><i
            class="fa-solid fa-caret-right"></i></button>
</div>
