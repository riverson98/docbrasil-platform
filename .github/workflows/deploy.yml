name: Deploy na VM Azure

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Node e Angular CLI
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          npm install -g @angular/cli

      - name: Instalar dependências e buildar o frontend
        working-directory: ./frontend/doc-brasil
        run: |
          npm ci
          ng build --configuration=production

      - name: Mover pasta dist para project-root/frontend
        run: |
          mkdir -p frontend
          if [ -d "frontend/doc-brasil/dist/doc-brasil" ]; then
            cp -r frontend/doc-brasil/dist/doc-brasil/* frontend/
          else
            echo "❌ Pasta 'dist/doc-brasil' não encontrada."
            exit 1
          fi

      - name: Logar no Azure com Service Principal
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Obter segredos do Key Vault
        id: keyvault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            ASSOCIADOS_PASSWORD=$(az keyvault secret show --vault-name chavesapisecretas --name AssociadosDbPassword --query value -o tsv)
            AUTH_PASSWORD=$(az keyvault secret show --vault-name chavesapisecretas --name AssociadosDbAuthPassword --query value -o tsv)
            
            # Debug seguro: mostra se está vazio ou não
            if [ -z "$ASSOCIADOS_PASSWORD" ]; then
              echo "ASSOCIADOS_PASSWORD está vazio!"
            else
              echo "ASSOCIADOS_PASSWORD recuperado com sucesso $ASSOCIADOS_PASSWORD"
            fi

            if [ -z "$AUTH_PASSWORD" ]; then
              echo "AUTH_PASSWORD está vazio!"
            else
              echo "AUTH_PASSWORD recuperado com sucesso $AUTH_PASSWORD"
            fi

            echo "associados_password=$ASSOCIADOS_PASSWORD" >> $GITHUB_OUTPUT
            echo "auth_password=$AUTH_PASSWORD" >> $GITHUB_OUTPUT

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Enviar arquivos para a VM
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" ./ azureuser@${{ secrets.VM_HOST }}:/home/azureuser/associados-app

      - name: Reconstruir containers com Docker Compose
        env:
          ASSOCIADOS_PASSWORD: ${{ steps.keyvault.outputs.associados_password }}
          AUTH_PASSWORD: ${{ steps.keyvault.outputs.auth_password }}
        run: |
          ssh -i ~/.ssh/id_rsa azureuser@${{ secrets.VM_HOST }} << EOF
          set -e
          cd /home/azureuser/associados-app

          echo "MYSQL_ASSOCIADOS_PASSWORD=${{ steps.keyvault.outputs.associados_password }}" > .env.prod
          echo "MYSQL_ASSOCIADOS_AUTH_PASSWORD=${{ steps.keyvault.outputs.auth_password }}" >> .env.prod

          docker compose down --remove-orphans
          docker compose build --no-cache
          docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --force-recreate
          EOF
