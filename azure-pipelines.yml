# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build images with docker-compose
  jobs:
  - job: Build
    displayName: Build using docker-compose
    pool:
      name: vm-linux
    steps:
    - checkout: self

    - task: AzureKeyVault@2
      inputs:
        azureSubscription: 'DevOps Service Connection'
        KeyVaultName: 'DocBrasilKeyVault'
        SecretsFilter: 'AssociateDbPassword,AuthDbPassword,AssociateAuthKey,AssociateKey,AzureBlobContainerSecretKey,AzureSecretKey'
        RunAsPreJob: true
      env:
        AZURE_HTTP_USER_AGENT: 'azure-pipelines'

    - script: |
        cd frontend/doc-brasil
        /usr/bin/npm install
        /usr/bin/npm run build --prod
      displayName: 'Build frontend Angular'

    - script: |
        echo "AssociateDbPassword=$(AssociateDbPassword)"
        echo "AuthDbPassword=$(AuthDbPassword)"
      displayName: 'DEBUG: Verificar variáveis do Key Vault'

    - script: |
        echo "ASPNETCORE_ENVIRONMENT=Production" > .env.prod
        echo "ConnectionStrings__MySqlConnection=Server=associados-db;Database=associadosdb;User=root;Password=$(AssociateDbPassword)" >> .env.prod
        echo "ConnectionStrings__MySqlAuthConnection=Server=associadosAuth-db;Database=associadosAuthdb;User=docBrasilProdAuth;Password=$(AuthDbPassword)" >> .env.prod
      displayName: 'Gerar .env.prod com valores reais'

    - script: |
        export PATH=$PATH:/usr/bin

        /usr/bin/sudo docker-compose -f docker-compose.yml -f docker-compose-prod.yml build --no-cache
        /usr/bin/sudo docker-compose -f docker-compose.yml -f docker-compose-prod.yml up
      workingDirectory: $(Build.SourcesDirectory)
