# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build images with docker-compose
  jobs:
  - job: Build
    displayName: Build using docker-compose
    pool:
      name: vm-linux
    steps:
    - checkout: self

    - task: AzureKeyVault@2
      inputs:
        azureSubscription: 'DevOps Service Connection'
        KeyVaultName: 'DocBrasilKeyVault'
        SecretsFilter: 'AssociateDbPassword,AuthDbPassword,AssociateAuthKey,AssociateKey,AzureBlobContainerSecretKey,AzureSecretKey'
        RunAsPreJob: true
      env:
        AZURE_HTTP_USER_AGENT: 'azure-pipelines'

    - script: |
        cd frontend/doc-brasil
        /usr/bin/npm install
        /usr/bin/npm run build --prod
      displayName: 'Build frontend Angular'

    - script: |
        echo "ASPNETCORE_ENVIRONMENT=Production" > .env.prod
        echo "ConnectionStrings__MySqlConnection=Server=associados-db;Database=associadosdb;User=root;Password=${MYSQL_ASSOCIADOS_PASSWORD}" >> .env.prod
        echo "ConnectionStrings__MySqlAuthConnection=Server=associadosAuth-db;Database=associadosAuthdb;User=docBrasilProdAuth;Password=${MYSQL_ASSOCIADOS_AUTH_PASSWORD}" >> .env.prod
      displayName: 'Gerar .env.prod'
      env:
        MYSQL_ASSOCIADOS_PASSWORD: $(AssociateDbPassword)
        MYSQL_ASSOCIADOS_AUTH_PASSWORD: $(AuthDbPassword)
      displayName: Build containers with docker-compose
      workingDirectory: $(Build.SourcesDirectory)
